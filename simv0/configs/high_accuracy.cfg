# high_accuracy.cfg  --  High-accuracy configuration for simv0
#
# Purpose:
#   Scientific-quality results for the 2-state coupled BTE-NS system.
#   Classical RK4 with a fine fixed step size gives O(h^4) accuracy
#   without adaptive overhead.
#
# To use: edit simv0_config.f90 to match these settings, then recompile.
#
# ---- Simulation settings ----
h_default  = 10.0        # step size (s); tau/h = 39.5 -> well resolved
t_end      = 86400.0     # 24-hour simulation (s)
atol       = 0.01        # absolute tolerance (K); high accuracy
rtol       = 1.0e-7      # relative tolerance
#
# ---- Physics complexity ----
mode       = COUPLED     # 2-state [T, WS] with full BTE-NS coupling
use_spatial = false
use_bte    = false
#
# Expected method selection:
#   tau/h = 39.5 >> 5  -> stiffness rule does NOT trigger
#   tol = 0.01 K       -> high accuracy rule triggers -> RK45 or RK4
#   sim_mode = COUPLED -> coupling rule triggers -> at least RK4
#   -> METHOD_RK4 selected  (classical RK4, 8640 steps)
#
# Alternative: set atol = 0.005 K to trigger RK45 (tol < 0.01)
#
# Expected energy yield (24h, RK4, h=10s): ~1857.1 Wh  (same as h=100s)
# Typical run time: < 5 s
