# full_physics.cfg  --  Full-physics configuration for simv0
#
# Purpose:
#   Maximum physical fidelity: spatial 1D panel PDE (Method of Lines) with
#   two-way BTE coupling (downwelling + upwelling).  RK45 Dormand-Prince
#   with adaptive step-size control is always selected for this mode.
#
# To use: this is the DEFAULT configuration.  Run ./simv0 as-is.
#
# ---- Simulation settings ----
h_default  = 100.0       # initial step size hint for RK45 (s); adapted automatically
h_min      = 1.0         # minimum allowed step (s); CFL-limited: ~1.35 s
h_max      = 600.0       # maximum allowed step (s)
t_end      = 86400.0     # 24-hour simulation (s)
atol       = 0.1         # absolute tolerance (K)
rtol       = 1.0e-6      # relative tolerance
safety     = 0.9         # step-size safety factor
max_steps  = 50000       # step safety limit
#
# ---- Spatial discretisation ----
N_layers   = 5           # panel depth cells (glass | EVA | silicon | EVA | backsheet)
L_panel    = 0.01        # total panel thickness (m)
kappa_cond = 1.0         # thermal conductivity (W/m/K)
kappa_abs  = 100.0       # optical absorption coefficient (1/m)
#
# ---- Physics complexity ----
mode       = SPATIAL     # (N_layers+1)-state [T_1..T_N, WS]
use_spatial = true       # 1D heat equation, method of lines
use_bte    = true        # two-way BTE: Beer-Lambert down + S-B upwelling up
#
# Expected method selection:
#   sim_mode = SPATIAL -> spatial rule triggers -> METHOD_RK45
#   (no other rules needed; RK45 is always appropriate for multi-state PDE)
#
# Typical adaptive step at peak: ~2-3 s (constrained by thermal diffusion CFL)
# Steps accepted: ~35000   Steps rejected: ~900
# Expected run time: ~5 s
#
# ---- Two-way BTE coupling ----
# Downwelling:  G_down(z_i) = G_eff(t) * exp(-kappa_abs * z_i)
# Absorption:   Q_solar_i   = G_down(z_{i-1}) - G_down(z_i)  [W/m^2 per layer]
# Upwelling:    G_up(z=0)   = eps * sum_i sigma*T_i^4 * emittance_i * transmittance_i
# Feedback:     Higher interior T -> more G_up -> increased radiative loss diagnostic
#
# Output files:
#   simv0_spatial.dat    : T_1..T_5, WS, G_up, P_surf vs time
#   simv0_diagnostic.dat : RK45 step-size log (accepted/rejected per step)
