# balanced.cfg  --  Balanced accuracy/cost configuration for simv0
#
# Purpose:
#   Moderate accuracy with reasonable compute cost.  Improved Euler (Heun)
#   is selected when coupling is light and accuracy requirements are mid-range.
#
# To use: edit simv0_config.f90 to match these settings, then recompile.
#
# ---- Simulation settings ----
h_default  = 100.0       # step size (s); tau/h = 3.95 -> slightly stiff
t_end      = 86400.0     # 24-hour simulation (s)
atol       = 0.1         # absolute tolerance (K)
rtol       = 1.0e-5      # relative tolerance
#
# ---- Physics complexity ----
mode       = COUPLED     # 2-state [T, WS] with BTE diurnal G_eff + NS wind ODE
use_spatial = false
use_bte    = false       # one-way BTE only (no upwelling correction)
#
# Expected method selection:
#   sim_mode = COUPLED  -> coupling rule triggers  -> at least Heun
#   tau/h = 3.95 < 5    -> stiffness rule triggers -> at least RK4
#   -> METHOD_RK4 selected  (stiffness upgrades from Heun to RK4)
#
# Note: To obtain Heun, reduce coupling (use MODE_DECOUPLED) or
#       increase h so tau/h > 5 and tol > 0.1 K.
#
# Typical run time: < 1 s
