# fast.cfg  --  Low-accuracy exploratory configuration for simv0
#
# Purpose:
#   Maximum speed.  Forward Euler is naturally selected when:
#     - tau/h >> 1  (stiffness ratio well above stability threshold)
#     - tol is large  (accuracy not paramount)
#     - No physics coupling (MODE_DECOUPLED)
#
# To use: edit simv0_config.f90 to change h_default and atol, then recompile.
#
# ---- Simulation settings ----
h_default  = 50.0        # step size (s); tau/h = 395/50 = 7.9 → Euler acceptable
t_end      = 86400.0     # 24-hour simulation (s)
atol       = 0.5         # absolute tolerance (K); "rough" accuracy
rtol       = 1.0e-4      # relative tolerance
#
# ---- Physics complexity ----
mode       = DECOUPLED   # 1-state (T only), constant G/h/eta
use_spatial = false
use_bte    = false
#
# Expected method selection:
#   tau/h = 7.9 > 5  -> stiffness rule does not trigger
#   tol = 0.5 K > 0.1 K -> accuracy rule does not trigger
#   mode = DECOUPLED -> coupling rule does not trigger
#   -> METHOD_EULER selected  (forward Euler)
#
# Typical run time: < 1 s
